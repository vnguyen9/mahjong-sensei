      0m: 5m
      0p: 5p
      0s: 5s
      # all other names are identity (omit or list explicitly in script)

# Filename / path substrings treated as screen / game-UI (skip image).
screen_exclude_substrings:
  - mahjongsoul
  - mahjong_soul
  - majsoul
  - screenshot
  - screen_shot
  - gameui
  - game_ui
  - desktop
