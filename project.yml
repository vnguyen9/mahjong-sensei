name: MahjongSensei

options:
  bundleIdPrefix: com.lumiodatalabs
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en

packages:
  MahjongCore:
    path: Packages/MahjongCore
  MahjongData:
    path: Packages/MahjongData
  Recognition:
    path: Packages/Recognition
  DesignSystem:
    path: Packages/DesignSystem
  ScoringEngine:
    path: Packages/ScoringEngine
  EfficiencyEngine:
    path: Packages/EfficiencyEngine
  CoachEngine:
    path: Packages/CoachEngine
  MahjongGameEngine:
    path: Packages/MahjongGameEngine

targets:
  MahjongSensei:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Sources
        excludes:
          - Resources/Models/MahjongTileLocatorV3.mlpackage
    dependencies:
      - package: MahjongCore
      - package: MahjongData
      - package: Recognition
      - package: DesignSystem
      - package: ScoringEngine
      - package: EfficiencyEngine
      - package: CoachEngine
      - package: MahjongGameEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumiodatalabs.MahjongSensei
        PRODUCT_NAME: Mahjong Sensei
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Device signing: pick your team in Xcode → Signing & Capabilities. To make
        # it survive `xcodegen generate`, add `DEVELOPMENT_TEAM: <YOUR_TEAM_ID>` here.
        DEVELOPMENT_TEAM: WX6S96WKKC
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Mahjong Sensei
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # iPadOS 26 requires dynamically resizable apps to declare every iPad
        # orientation. `_iPad` is Xcode's generated-Info.plist build-setting
        # suffix; it emits the device-qualified `~ipad` plist key. Keep the
        # unqualified iPhone setting portrait-only.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Mahjong Sensei reads your tiles on-device. Images are processed live and never leave your device."

  MahjongSenseiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Tests
    dependencies:
      - target: MahjongSensei
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumiodatalabs.MahjongSenseiTests
        SWIFT_VERSION: "5.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mahjong Sensei.app/Mahjong Sensei"
        BUNDLE_LOADER: "$(TEST_HOST)"

  MahjongSenseiUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/UITests
    dependencies:
      - target: MahjongSensei
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumiodatalabs.MahjongSenseiUITests
        SWIFT_VERSION: "5.0"
        TEST_TARGET_NAME: MahjongSensei

schemes:
  MahjongSensei:
    build:
      targets:
        MahjongSensei: all
        MahjongSenseiTests: [test]
    test:
      targets:
        - MahjongSenseiTests
        - MahjongSenseiUITests
